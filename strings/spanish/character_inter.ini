# Character interaction config:
# Contains text consisting of messages that each character might use to
# welcome another character to the crew. The numbers represent character icon
# ids, see the image containing character icons for reference.
# Castaway
[character_1]
welcomes_girl = "<c:Castaway:1>¿Te dormiste durante un asalto? Qué suerte... Cuando los goblins vinieron a por mi nave, lo único que pude hacer fue entrar en pánico y saltar a un transportador. Estarás más segura con nosotros."
regression_test = "Working!"
welcomes_traveller = "<c:Castaway:1>¡Otro refugiado del transportador! A mí me pasó lo mismo... aunque todavía no sé si saltar a ciegas fue valiente o simplemente suerte..."
# Other Castaway
[character_27]
welcomes_girl = "<c:Castaway:27>Tu aldea tuvo más agallas que mi antigua tripulación. A mí me tiraron por la borda antes que enfrentarse a los asaltantes. ¡Al menos aquí nos apoyamos!"
welcomes_explorer = "<c:Castaway:27>¿Cartografiando los cielos? Bien. Cuanto más sepamos de lo que hay ahí fuera, mejor podremos defendernos. ¡Bienvenido a bordo!"
# Girl from burning island
[character_14]
welcomes_castaway_1 = "<c:Girl:14>¡Otro superviviente! Sé cómo se siente... la tripulación de aquí me ayudó cuando perdí mi aldea. ¡Estás en buenas manos!"
welcomes_castaway_2 = "<c:Girl:14>¡Otro superviviente! Sé cómo se siente... la tripulación de aquí me ayudó cuando perdí mi aldea. ¡Estás en buenas manos!"
welcomes_warrior_princess = "<c:Girl:14>(Aparte: ¡La princesa guerrera mola muchísimo! <B:0> Algún día quiero ser como ella...)"
# Explorer
[character_22]
welcomes_warrior_princess = "<c:Explorer:22>¿Una misión real para recuperar armas antiguas? ¡Nunca había cartografiado este lugar, qué emocionante!"
# Goblin raider
[character_39]
goblin_raid_weapon = "<c:Goblin Raider:39>Hmm. Los asaltantesss no abandonan armamento a menosss que huyeran a toda prisa. <B:0> Lo que sea que losss asustó... esperemosss que no nos encuentre."